name: Android Release Management

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release Type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  build-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # Checkout
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Java
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      # Install dependencies
      - name: Install Dependencies
        run: npm install

      # Gradle permission
      - name: Grant gradlew permission
        run: chmod +x android/gradlew

      # Run release script
      - name: Build Release APK
        run: npm run release:${{ github.event.inputs.release_type }}

      # Verify generated APK
      - name: Verify APK Exists
        run: |
          echo "Generated APK files:"
          ls -la android/app/build/outputs/apk/release/

      # Get package version from package.json
      - name: Get Version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # Find generated APK
      - name: Find APK
        id: find_apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -n 1)

          if [ -z "$APK_PATH" ]; then
            echo "APK not found"
            exit 1
          fi

          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      # Upload artifact to GitHub Actions
      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-v${{ steps.version.outputs.version }}
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30

      # Commit updated version files
      - name: Commit Version Changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add package.json
          git add android/app/build.gradle

          git commit -m "Release v${{ steps.version.outputs.version }}" || echo "No changes to commit"

          git push

      # Create Git tag
      - name: Create Git Tag
        run: |
          git tag v${{ steps.version.outputs.version }}
          git push origin v${{ steps.version.outputs.version }}

      # Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          files: ${{ steps.find_apk.outputs.apk_path }}
          generate_release_notes: true
